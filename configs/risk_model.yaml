version: 1

feature_view: vw_mine_quarter_mvp_features
training_view: vw_mine_quarter_mvp_training

target:
  name: had_incident_next_qtr
  positive_class: 1
  negative_class: 0
  null_policy: exclude_from_training

identifiers:
  - mine_key
  - period_key
  - year
  - quarter

feature_columns:
  - feat_prior_incident_count
  - feat_rolling_4q_incident_count
  - feat_prior_lost_day_incident_count
  - feat_incident_rate_per_200k_hours

passthrough_columns:
  - next_period_key
  - next_quarter_exists_flag
  - incident_count_current_qtr
  - incident_count_prior_qtr
  - employee_hours
  - lost_day_incident_count_current_qtr

imputation:
  strategy: explicit_zero_for_baseline
  columns:
    feat_prior_incident_count: zero
    feat_rolling_4q_incident_count: zero
    feat_prior_lost_day_incident_count: zero
    feat_incident_rate_per_200k_hours: zero

split:
  time_order_columns:
    - year
    - quarter
  group_column: mine_key

baseline_models:
  logistic_regression:
    enabled: true
    class_weight: balanced
    max_iter: 1000
  rule_score:
    enabled: true
